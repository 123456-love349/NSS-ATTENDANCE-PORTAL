{% extends "base.html" %}
{% block title %}QR Code Invalid · NSS Attendance{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card p-4 p-md-5 mt-4 text-center">
            <i class="bi bi-qr-code-scan text-danger" style="font-size: 4rem;"></i>
            <h3 class="mt-3">QR Code Not Valid</h3>
            <p class="text-muted">{{ reason }}</p>
            <a href="{{ url_for('student.attend_manual') }}" class="btn btn-outline-success">
                <i class="bi bi-pencil-square"></i> Use Manual Attendance Instead
            </a>
        </div>
    </div>
</div>
{% endblock %}
