{% extends "base.html" %}
{% block title %}Error {{ code }} · NSS Attendance{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card p-4 p-md-5 mt-4 text-center">
            <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 3.5rem;"></i>
            <h2 class="mt-3">Error {{ code }}</h2>
            <p class="text-muted">{{ message }}</p>
            <a href="{{ url_for('student.attend_manual') }}" class="btn btn-outline-success">
                <i class="bi bi-house"></i> Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
